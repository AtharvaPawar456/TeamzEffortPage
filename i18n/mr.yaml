stories:
  eyebrow: "शिक्षार्थी कथा"
  heading: "शिक्षार्थी काय म्हणतात"
  intro: "TeamzEffort सोबत डिजिटल कौशल्ये शिकणाऱ्यांचे अभिप्राय."
  t1_quote: "\"मला डिजिटल मार्केटिंगची जवळजवळ काहीच कल्पना नव्हती. TeamzEffort ने कंटेंट प्लॅनिंगपासून सोशल मीडियापर्यंत पायरी-पायरीने शिकवले. काही आठवड्यांत मी स्पष्ट योजनेने पोस्ट करू लागलो.\""
  t1_role: "शिक्षार्थी · सोशल मीडिया मूलतत्त्वे"
  t2_quote: "\"SEO आणि वेबसाइट मॉड्यूल्स सर्वात उपयुक्त ठरले. लोक ऑनलाइन कसे शोधतात आणि पेज कसे स्ट्रक्चर करावे हे शिकलो. मेंटर्सने सोप्या भाषेत समजावले.\""
  t2_role: "शिक्षार्थी · SEO आणि वेबसाइट्स"
  t3_quote: "\"पेड अॅड्स नेहमी क्लिष्ट वाटत होते. अॅड्स मॉड्यूलनंतर टार्गेटिंग, बजेट आणि क्रिएटिव्ह टेस्ट समजली. पहिले छोटे कॅम्पेन आत्मविश्वासाने लाँच केले.\""
  t3_role: "शिक्षार्थी · पेड अॅडव्हर्टायझिंग"
  t4_quote: "\"मला सर्वात आवडले ते व्यावहारिक प्रोजेक्ट्स. साधे लँडिंग पेज, पहिले कॅप्शन्स आणि समुदायाकडून फीडबॅक — फक्त थिअरी नव्हे, खरे काम.\""
  t4_role: "शिक्षार्थी · कंटेंट आणि लँडिंग पेजेस"
  t5_quote: "\"पर्सनल ब्रँडिंग आणि ग्राफिक डिझाइन मूलतत्त्वांमुळे ऑनलाइन आत्मविश्वास वाढला. स्वतःला कसे सादर करावे, साधी क्रिएटिव्ह्ज कशी बनवावी आणि WhatsApp समुदायासह सातत्य कसे ठेवावे हे आता कळते.\""
  t5_role: "शिक्षार्थी · पर्सनल ब्रँडिंग"
  t6_quote: "\"व्यस्त शिक्षार्थी म्हणून लवचिक गती खूप महत्त्वाची होती. लहान मॉड्यूल्स, स्पष्ट मार्गदर्शन आणि WhatsApp ग्रुपमुळे ट्रॅकवर राहिलो. आता कंटेंट, ब्रँडिंग आणि ऑनलाइन वाढ समजते.\""
  t6_role: "शिक्षार्थी · लवचिक शिक्षण मार्ग"
  cta_enroll: "नोंदणी करा"

faq:
  eyebrow: "प्रश्नोत्तरे"
  heading: "वारंवार विचारले जाणारे प्रश्न"
  intro: "आमचे शिक्षण मॉडेल, वेळेची गरज आणि नोंदणीबाबत थोडक्यात उत्तरे."
  q1: "सामील होण्यासाठी आधी मार्केटिंग अनुभव हवा का?"
  a1: "<strong>अजिबात नाही.</strong> आमचा अभ्यासक्रम पायापासून तयार आहे. आम्ही डिजिटल मार्केटिंग मूलतत्त्वांपासून सुरू करतो आणि हळूहळू पर्सनल ब्रँडिंग, कंटेंट स्ट्रॅटेजी आणि पेड अॅक्विझिशनकडे जातो."
  q2: "दर आठवड्याला किती वेळ द्यावा लागतो?"
  a2: "आम्ही सुमारे <strong>दर आठवड्याला ३ ते ५ तास</strong> सुचवतो. प्रोग्राम स्व-गतीचा आहे — व्यस्त प्रोफेशनल्स, विद्यार्थी आणि साइड-हसलर्ससाठी लवचिक."
  q3: "मी स्वतःची वेबसाइट कशी बनवायची ते शिकेन का?"
  a3: "<strong>होय.</strong> आधुनिक, सोप्या नो-कोड टूल्सने हाय-कन्व्हर्टिंग लँडिंग पेजेस आणि मूलभूत वेबसाइट्स बनवणे शिकाल."
  q4: "फक्त एका चॅनेलवर, जसे सोशल मीडिया, लक्ष केंद्रित करता येईल का?"
  a4: "होय. मार्ग मॉड्युलर आहेत. तुमच्या ध्येयानुसार <strong>सोशल मीडिया, SEO, पेड अॅड्स, ब्रँडिंग किंवा कंटेंट</strong> वर लक्ष केंद्रित करू शकता."
  q5: "इन्व्हेस्टमेंट किती, आणि पेमेंट प्लॅन्स आहेत का?"
  a5: "आम्ही लवचिक मासिक पेमेंट पर्याय आणि पात्र विद्यार्थ्यांसाठी शिष्यवृत्ती दर देतो. आमच्या WhatsApp समुदायात सामील व्हा आणि योग्य प्लॅनसाठी मेसेज करा."

